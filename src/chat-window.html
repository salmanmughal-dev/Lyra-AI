<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lyra AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            overflow: hidden;
            color: #cdd6f4;
        }

        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(116, 199, 236, 0.3);
            border-radius: 16px;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-app-region: drag;
        }

        .chat-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            width: 32px;
            height: 32px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
            -webkit-app-region: no-drag;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .selected-text-display {
            background: rgba(116, 199, 236, 0.1);
            border: 1px solid rgba(116, 199, 236, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin: 16px;
            font-size: 14px;
            line-height: 1.5;
            max-height: 120px;
            overflow-y: auto;
            display: none;
            position: relative;
        }

        .selected-text-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .selected-text-label {
            font-weight: 600;
            color: #74c7ec;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .refresh-text-btn {
            background: rgba(116, 199, 236, 0.2);
            border: 1px solid rgba(116, 199, 236, 0.4);
            border-radius: 6px;
            color: #74c7ec;
            font-size: 12px;
            padding: 4px 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .refresh-text-btn:hover {
            background: rgba(116, 199, 236, 0.3);
            transform: scale(1.05);
        }

        .messages-container {
            flex: 1;
            padding: 0 16px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message.assistant {
            text-align: left;
        }

        .message-bubble {
            display: inline-block;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-bubble {
            background: rgba(116, 199, 236, 0.1);
            border: 1px solid rgba(116, 199, 236, 0.2);
            color: #cdd6f4;
        }

        /* Formatting styles for AI responses */
        .message-bubble h1, .message-bubble h2, .message-bubble h3 {
            margin: 8px 0 4px 0;
            color: #74c7ec;
        }

        .message-bubble h1 { font-size: 18px; }
        .message-bubble h2 { font-size: 16px; }
        .message-bubble h3 { font-size: 15px; }

        .message-bubble ul, .message-bubble ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-bubble li {
            margin: 4px 0;
            line-height: 1.5;
        }

        .message-bubble strong, .message-bubble b {
            color: #f9e2af;
            font-weight: 600;
        }

        .message-bubble em, .message-bubble i {
            color: #f5c2e7;
            font-style: italic;
        }

        .message-bubble code {
            background: rgba(69, 71, 90, 0.6);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #a6e3a1;
        }

        .message-bubble pre {
            background: rgba(69, 71, 90, 0.6);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-bubble p {
            margin: 6px 0;
        }

        .message-bubble blockquote {
            border-left: 3px solid #74c7ec;
            padding-left: 12px;
            margin: 8px 0;
            font-style: italic;
            opacity: 0.9;
        }

        .input-container {
            padding: 16px;
            background: rgba(49, 50, 68, 0.8);
            border-top: 1px solid rgba(116, 199, 236, 0.2);
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            background: rgba(69, 71, 90, 0.8);
            border: 1px solid rgba(116, 199, 236, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            color: #cdd6f4;
            resize: none;
            max-height: 120px;
            min-height: 44px;
            outline: none;
            transition: all 0.2s ease;
        }

        .message-input:focus {
            border-color: #74c7ec;
            box-shadow: 0 0 0 2px rgba(116, 199, 236, 0.2);
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            font-size: 16px;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-indicator {
            display: none;
            padding: 16px;
            text-align: center;
            color: #74c7ec;
        }

        .loading-dots {
            display: inline-block;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 33% { content: '.'; }
            34%, 66% { content: '..'; }
            67%, 100% { content: '...'; }
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            margin: 8px 0;
        }

        .typing-indicator.show {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #74c7ec;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        .typing-dot:nth-child(3) { animation-delay: 0; }

        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(69, 71, 90, 0.4);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(116, 199, 236, 0.6);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(116, 199, 236, 0.8);
        }

        /* Additional styles for translation results */
        .translation-result {
            background: rgba(116, 199, 236, 0.1);
            border-radius: 12px;
            padding: 16px;
        }

        .original-text {
            font-size: 18px;
            color: #f9e2af;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(116, 199, 236, 0.2);
        }

        .translations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .translation-item {
            background: rgba(69, 71, 90, 0.4);
            border-radius: 8px;
            padding: 10px;
        }

        .translation-item .language {
            color: #74c7ec;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .translation-item .translated-text {
            color: #cdd6f4;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-title">✨ Lyra AI Assistant</div>
            <button class="close-btn" id="closeBtn">×</button>
        </div>

        <div class="selected-text-display" id="selectedTextDisplay">
            <div class="selected-text-header">
                <div class="selected-text-label">Selected Text</div>
                <button class="refresh-text-btn" id="refreshTextBtn">🔄 Refresh</button>
            </div>
            <div id="selectedTextContent"></div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="message assistant">
                <div class="message-bubble">
                    Hello! I'm Lyra, Personal AI Assistant of Salman
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
            <span>Give me a moment Salman...</span>
        </div>

        <div class="input-container">
            <div class="input-row">
                <textarea 
                    class="message-input" 
                    id="messageInput" 
                    placeholder="Ask me Salman..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script src="chat-script.js"></script>
</body>
</html>
